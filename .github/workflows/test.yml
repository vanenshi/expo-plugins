name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    name: Build and test on Node ${{ matrix.node }}
    steps:
      - name: 👀 Checkout
        uses: actions/checkout@v4

      - name: 🔨 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: ⚙️ Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: 📦 Install
        run: pnpm install --frozen-lockfile

      - name: 🏗 Build
        run: pnpm run build

      - name: 🧹 Lint
        run: pnpm run lint --max-warnings 0

      - name: 🧪 Test
        run: pnpm run test
        env:
          CI: true
